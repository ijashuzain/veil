<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Veil is your film diary for tracking, rating, and discovering what to watch.">
  <meta name="theme-color" content="#050507">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Veil">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Veil</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      color-scheme: dark;
      background: #050507;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      background: #050507;
    }

    body {
      position: fixed;
      inset: 0;
      min-height: var(--veil-viewport-height, 100vh);
    }

    flutter-view,
    flt-glass-pane,
    flt-scene-host,
    flt-semantics-host {
      background: #050507 !important;
    }
  </style>
</head>
<body>
  <script>
    (function() {
      function syncViewportHeight() {
        var height = window.innerHeight;
        if (window.visualViewport && window.visualViewport.height) {
          height = Math.max(height, window.visualViewport.height);
        }
        document.documentElement.style.setProperty(
          '--veil-viewport-height',
          height + 'px'
        );
      }

      function refreshFlutterMetrics() {
        syncViewportHeight();
        window.dispatchEvent(new Event('resize'));
      }

      syncViewportHeight();
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', syncViewportHeight);
        window.visualViewport.addEventListener('scroll', syncViewportHeight);
      }
      window.addEventListener('pageshow', function() {
        requestAnimationFrame(refreshFlutterMetrics);
      });
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden) {
          requestAnimationFrame(refreshFlutterMetrics);
        }
      });
    })();
  </script>
  <script>
    (function() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/veil_service_worker.js', { scope: '/' })
          .catch(function(error) {
            console.warn('Veil service worker registration failed:', error);
          });
      }
    })();
  </script>
  <script src="flutter_bootstrap.js?v=20260509-viewport" async></script>
  <noscript>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #050505;
        color: white;
        font-family: Arial, sans-serif;
      }
    </style>
    JavaScript is required to run Veil.
  </noscript>
</body>
</html>
